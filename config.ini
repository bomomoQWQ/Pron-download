[site]
# 目标网站基础 URL（不含末尾斜杠）
base_url = https://www.pornhub.com
# 搜索路径模板（{keyword} 和 {page} 会被替换）
search_path = /video/search?search={keyword}&page={page}
# 分类浏览路径模板（{category} 和 {page} 会被替换）
category_path = /video?c={category}&page={page}
# 视频详情/embed 路径模板（{video_id} 会被替换）
embed_path = /embed/{video_id}
# 视频页路径模板（{video_id} 会被替换）
video_path = /view_video.php?viewkey={video_id}

[storage]
# 视频下载目录（相对路径 = 项目目录下，也可填绝对路径）
download_dir = ./downloads

# 文件服务模式: http | local
#   http  - 通过 HTTP 提供文件下载（沙箱 Agent 用）
#   local - 返回本地绝对路径（同机 Agent 直接读）
serve_mode = http

# HTTP 模式下监听的地址和端口
serve_host = 0.0.0.0
serve_port = 8765

[search]
# 每次搜索最大结果数
max_results = 30
# 搜索超时（秒）
timeout = 30
# 搜索间隔最小延迟（秒），避免触发频率限制
min_delay = 2.0

[download]
# 同时下载的最大并发数
max_concurrent = 3
# 下载超时（秒）
timeout = 600
# 是否启用断点续传
resume = true
# 下载速度限制（KB/s，0 为不限制）
rate_limit = 0

[anti_detect]
# 请求最小延迟（秒）
min_request_delay = 1.0
# 请求最大延迟（秒）
max_request_delay = 3.0
# 最大重试次数
max_retries = 3
# 重试基础等待时间（秒）
retry_base_delay = 5.0
# 代理地址（可选，留空则直连）
proxy = 
# Cookie 持久化文件路径（相对路径 = 项目目录下）
cookie_file = cookies.json

[sqlite]
# 数据库文件路径（相对于项目目录）
db_path = data.db
